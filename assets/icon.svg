<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PropertyOps icon">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2028"/>
      <stop offset="1" stop-color="#0f1217"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffc36a"/>
      <stop offset="1" stop-color="#e8912b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffb04a" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffb04a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Tile -->
  <rect width="512" height="512" rx="116" fill="url(#tile)"/>
  <rect x="1" y="1" width="510" height="510" rx="115" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="2"/>

  <!-- Ground line -->
  <rect x="120" y="372" width="272" height="4" rx="2" fill="#ffffff" fill-opacity="0.10"/>

  <!-- Property "skyline" = property + operational data -->
  <g>
    <rect x="147" y="222" width="66" height="150" rx="12" fill="#f4f0e8"/>
    <rect x="223" y="162" width="66" height="210" rx="12" fill="#f4f0e8"/>
    <rect x="299" y="262" width="66" height="110" rx="12" fill="#f4f0e8"/>
    <!-- windows -->
    <g fill="#12151b" fill-opacity="0.85">
      <rect x="162" y="244" width="16" height="16" rx="4"/>
      <rect x="182" y="244" width="16" height="16" rx="4"/>
      <rect x="162" y="272" width="16" height="16" rx="4"/>
      <rect x="182" y="272" width="16" height="16" rx="4"/>

      <rect x="238" y="196" width="16" height="16" rx="4"/>
      <rect x="258" y="196" width="16" height="16" rx="4"/>
      <rect x="238" y="224" width="16" height="16" rx="4"/>
      <rect x="258" y="224" width="16" height="16" rx="4"/>
      <rect x="238" y="252" width="16" height="16" rx="4"/>
      <rect x="258" y="252" width="16" height="16" rx="4"/>

      <rect x="314" y="284" width="16" height="16" rx="4"/>
      <rect x="334" y="284" width="16" height="16" rx="4"/>
    </g>
    <!-- amber "active record" cap on the tall tower -->
    <rect x="223" y="162" width="66" height="22" rx="11" fill="url(#amber)"/>
  </g>

  <!-- AI node linked into the data -->
  <circle cx="336" cy="150" r="60" fill="url(#glow)"/>
  <line x1="336" y1="150" x2="256" y2="184" stroke="#e8912b" stroke-width="4" stroke-dasharray="2 11" stroke-linecap="round"/>
  <circle cx="336" cy="150" r="34" fill="url(#amber)"/>
  <circle cx="336" cy="150" r="52" fill="none" stroke="#e8912b" stroke-opacity="0.35" stroke-width="3"/>
  <text x="336" y="160" font-family="'JetBrains Mono','Courier New',monospace" font-size="26" font-weight="700" fill="#1a1200" text-anchor="middle" letter-spacing="1">AI</text>
</svg>
